<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listar Clientes</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="title">👥 Clientes Cadastrados</h1>
      <a href="{{ url_for('menu') }}" class="btn btn-danger">Voltar ao Menu</a>
    </div>
    <div class="card">
      <table style="width:100%; border-collapse: collapse;">
        <thead>
          <tr style="background:#0f2b5c; color:white;">
            <th style="padding:12px; text-align:left;">ID</th>
            <th style="padding:12px; text-align:left;">Nome</th>
            <th style="padding:12px; text-align:left;">Email</th>
            <th style="padding:12px; text-align:left;">Telefone</th>
          </tr>
        </thead>
        <tbody>
          {% for cliente in clientes %}
          <tr>
            <td style="padding:12px;">{{ cliente['id'] }}</td>
            <td style="padding:12px;">{{ cliente['name'] }}</td>
            <td style="padding:12px;">{{ cliente['email'] or '-' }}</td>
            <td style="padding:12px;">{{ cliente['phone'] or '-' }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>

      {% if not clientes %}
        <p style="text-align:center; padding:40px; color:#777;">Nenhum cliente cadastrado ainda.</p>
      {% endif %}
    </div>
  </div>
</body>
</html>

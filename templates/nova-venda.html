<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Venda</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="title">💰 Nova Venda</h1>
      <a href="{{ url_for('menu') }}" class="btn btn-danger">← Voltar ao Menu</a>
    </div>
    <div class="card">
      <form method="POST">
        <div class="form-group">
          <label><strong>Cliente</strong></label>
          <select name="customer_id" required>
            <option value="">Selecione o cliente...</option>
            {% for c in clientes %}
              <option value="{{ c['id'] }}">{{ c['name'] }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label><strong>Produto</strong></label>
          <select name="product_id" required>
            <option value="">Selecione o produto...</option>
            {% for p in produtos %}
              <option value="{{ p['id'] }}">
                {{ p['name'] }} — R$ {{ p['price']|round(2) }} (Estoque: {{ p['stock'] }})
              </option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label><strong>Quantidade</strong></label>
          <input type="number" name="quantity" value="1" min="1" required>
        </div>

        <button type="submit" class="btn btn-success" style="width:100%; padding:16px; font-size:18px;">
          Finalizar Venda
        </button>
      </form>
    </div>
  </div>
</body>
</html>
